<?xml version="1.0" encoding="utf-8"?>
<html xmlns:MadCap="http://www.madcapsoftware.com/Schemas/MadCap.xsd" MadCap:conditions="Primary.SampleTopics" style="mc-master-page: url('Resources/MasterPages/Admin_MP.flmsp');">
    <head><title>Setting up X: Essential Tasks</title>
        <style>
			.dropdown-content {
			display: none; /* Hide the content by default */
			}

			.dropdown-btn {
			background-color: #f9f9f9;
			border: none;
			padding: 10px;
			cursor: pointer;
			}

			.dropdown-btn:focus {
			outline: none;
			}

			.dropdown-btn:after {
			content: '\25BE'; /* Unicode down arrow symbol */
			float: right;
			}

			.dropdown-btn.collapsed:after {
			content: '\25B8'; /* Unicode right arrow symbol */
			}

			.dropdown-btn.collapsed + .dropdown-content {
			display: none;
			}

			.dropdown-btn:focus + .dropdown-content {
			display: block; /* Show the content when button is focused */
			}

		</style>
    </head>
    <body>
        <h1>Set Up and Run &lt;Workflow <MadCap:annotation MadCap:createDate="2018-11-14T10:44:10.8716208-07:00" MadCap:creator="jbadger" MadCap:initials="JB" MadCap:comment="Here's a link to the topic used to create this template.\r\n\r\nhttps://docs.microsoft.com/en-us/dynamicsax-2012/appuser-itpro/setting-up-payroll-basic-topics " MadCap:editor="jbadger" MadCap:editDate="2018-11-14T10:44:34.4733121-07:00">Name</MadCap:annotation>&gt;</h1>
        <p>&#160;</p>
        <div class="dropdown">
            <button class="dropdown-btn">Click to expand/collapse</button>
            <div class="dropdown-content">
                <p>This is the content that expands or collapses.</p>
                <p>It can have multiple paragraphs or any other elements.</p>
            </div>
        </div>
        <p>&#160;</p>
        <p>&#160;</p>
        <script>
			// Your JavaScript code here
			document.addEventListener('DOMContentLoaded', function() {
			var btn = document.querySelector('.dropdown-btn');
			var content = document.querySelector('.dropdown-content');

			btn.addEventListener('click', function() {
			if (content.style.display === 'none') {
			content.style.display = 'block';
			btn.classList.remove('collapsed');
			} else {
			content.style.display = 'none';
			btn.classList.add('collapsed');
			}
			});
			});
		</script>
    </body>
</html>
